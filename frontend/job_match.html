<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>岗位匹配 - 智能职业发展助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Segoe UI', 'Microsoft YaHei', sans-serif; }
        :root {
            --primary: #2C7BE5; --primary-dark: #1E40AF;
            --bg-primary: #F5F9FC; --bg-secondary: #FFFFFF;
            --text-primary: #1A365D; --text-secondary: #6B7280; --text-muted: #9CA3AF;
            --border: #E5E7EB; --success-bg: #E6F7E6; --success-text: #166534;
            --danger-bg: #FCE8E6; --danger-text: #991B1B;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05); --shadow: 0 2px 8px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.08); --radius: 8px;
        }
        body { background: var(--bg-primary); color: var(--text-primary); line-height: 1.6; }
        .navbar { background: var(--bg-secondary); box-shadow: var(--shadow-sm); position: sticky; top: 0; z-index: 100; }
        .navbar-content { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; max-width: 1200px; margin: 0 auto; width: 100%; box-sizing: border-box; }
        .navbar-brand { display: flex; align-items: center; gap: 12px; font-size: 18px; font-weight: 600; color: var(--text-primary); text-decoration: none; }
        .brand-icon { width: 32px; height: 32px; background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); border-radius: var(--radius); display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 14px; }
        .navbar-back { color: var(--primary); text-decoration: none; font-size: 14px; }
        .container { max-width: 1200px; margin: 0 auto; padding: 32px 24px; width: 100%; box-sizing: border-box; }
        .page-header { margin-bottom: 32px; }
        .step-nav { background: white; border-bottom: 1px solid var(--border); padding: 8px 24px; }
        .step-nav-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; gap: 0; flex-wrap: wrap; width: 100%; box-sizing: border-box; }
        .step-link { font-size: 12px; padding: 4px 10px; border-radius: 20px; color: var(--text-secondary); text-decoration: none; white-space: nowrap; transition: all 0.2s; }
        .step-link:hover { color: var(--primary); background: #EFF6FF; }
        .step-link.active { background: var(--primary); color: white; font-weight: 600; }
        .step-arrow { color: var(--text-muted); font-size: 11px; margin: 0 1px; }
        .step-nav-btns { margin-left: auto; display: flex; gap: 8px; }
        .btn-step { font-size: 12px; padding: 4px 12px; border-radius: var(--radius); border: 1px solid var(--border); background: white; color: var(--text-secondary); cursor: pointer; text-decoration: none; transition: all 0.2s; }
        .btn-step:hover { border-color: var(--primary); color: var(--primary); }
        .page-title { font-size: 28px; font-weight: 700; color: var(--text-primary); margin-bottom: 8px; }
        .page-subtitle { font-size: 15px; color: var(--text-secondary); }
        .card { background: white; border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow); padding: 24px; margin-bottom: 24px; }
        .card-title { font-size: 16px; font-weight: 600; color: var(--text-primary); margin-bottom: 16px; }
        .btn { padding: 10px 24px; border-radius: var(--radius); font-size: 14px; font-weight: 600; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 8px; transition: all 0.2s; text-decoration: none; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-primary:disabled { background: #93c5fd; cursor: not-allowed; }
        .btn-secondary { background: white; color: var(--text-primary); border: 1px solid var(--border); }
        .btn-sm { padding: 6px 14px; font-size: 13px; }
        .alert { padding: 12px 16px; border-radius: var(--radius); font-size: 14px; margin-bottom: 16px; }
        .alert-info { background: #EFF6FF; color: #1d4ed8; }
        .alert-success { background: var(--success-bg); color: var(--success-text); }
        .alert-error { background: var(--danger-bg); color: var(--danger-text); }
        .alert-warning { background: #FFF7ED; color: #9a3412; }
        .score-ring { width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 700; color: white; flex-shrink: 0; }
        .score-high { background: linear-gradient(135deg, #10B981, #059669); }
        .score-mid { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); }
        .score-low { background: linear-gradient(135deg, #F59E0B, #D97706); }
        .match-grid { display: grid; gap: 16px; }
        .match-card { background: white; border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; display: grid; grid-template-columns: auto 1fr; gap: 16px; align-items: start; transition: all 0.2s; }
        .match-card:hover { box-shadow: var(--shadow-md); border-color: var(--primary); }
        .match-info { flex: 1; }
        .match-title { font-size: 16px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
        .match-company { font-size: 14px; color: var(--text-secondary); margin-bottom: 8px; }
        .match-analysis { font-size: 13px; color: var(--text-secondary); margin-bottom: 10px; line-height: 1.5; background: var(--bg-primary); padding: 8px 12px; border-radius: 6px; }
        .score-bars { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 10px; }
        .score-bar-item { text-align: center; }
        .score-bar-label { font-size: 11px; color: var(--text-muted); margin-bottom: 4px; }
        .score-bar-track { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
        .score-bar-fill { height: 100%; border-radius: 3px; background: var(--primary); }
        .score-bar-val { font-size: 12px; font-weight: 600; color: var(--primary); margin-top: 3px; }
        .skills-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
        .skill-match { background: #E6F7E6; color: #166534; padding: 2px 8px; border-radius: 12px; font-size: 12px; }
        .skill-miss { background: var(--danger-bg); color: var(--danger-text); padding: 2px 8px; border-radius: 12px; font-size: 12px; }
        .match-actions { display: flex; gap: 8px; }
        .empty-state { text-align: center; padding: 48px 24px; color: var(--text-muted); }
        .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
        .spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none !important; }
        .badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
        .badge-blue { background: #EFF6FF; color: var(--primary); }
        .badge-warning { background: #FFF7ED; color: #9a3412; }

        /* 响应式设计 */
        @media (max-width: 1280px) {
            .container,
            .navbar-content,
            .step-nav-inner {
                max-width: 1100px;
            }
        }

        @media (max-width: 1024px) {
            .container,
            .navbar-content,
            .step-nav-inner {
                max-width: 960px;
                padding: 0 20px;
            }
            .container {
                padding: 28px 20px;
            }
            .match-card {
                grid-template-columns: auto 1fr;
            }
        }

        @media (max-width: 768px) {
            .container,
            .navbar-content,
            .step-nav-inner {
                max-width: 100%;
                padding: 0 16px;
            }
            .container {
                padding: 24px 16px;
            }
            .page-title {
                font-size: 24px;
            }
            .match-card {
                grid-template-columns: 1fr;
                padding: 16px;
            }
            .score-bars {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            .container,
            .navbar-content,
            .step-nav-inner {
                padding: 0 12px;
            }
            .container {
                padding: 20px 12px;
            }
            .page-title {
                font-size: 20px;
            }
            .card {
                padding: 20px 16px;
            }
            .match-card {
                padding: 16px 12px;
            }
            .score-bars {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="navbar-content">
        <a href="/" class="navbar-brand"><div class="brand-icon">智</div>智能职业发展助手</a>
        <a href="/" class="navbar-back">← 返回首页</a>
    </div>
</nav>
<div class="step-nav"><div class="step-nav-inner">
  <a href="job_scraper.html" class="step-link">1 岗位采集</a><span class="step-arrow">›</span>
  <a href="resume_manage.html" class="step-link">2 简历管理</a><span class="step-arrow">›</span>
  <a href="job_match.html" class="step-link active">3 岗位匹配</a><span class="step-arrow">›</span>
  <a href="resume_optimize.html" class="step-link">4 简历优化</a><span class="step-arrow">›</span>
  <a href="auto_apply.html" class="step-link">5 自动投递</a><span class="step-arrow">›</span>
  <a href="interview_coach.html" class="step-link">6 模拟面试</a>
  <div class="step-nav-btns"><a href="resume_manage.html" class="btn-step">‹ 上一步</a><a href="resume_optimize.html" class="btn-step">下一步 ›</a></div>
:</div></div>
<div class="container">
    <div class="page-header">
        <h1 class="page-title">🎯 岗位匹配</h1>
        <p class="page-subtitle">AI 深度语义匹配，从技能契合、岗位适配、薪资吸引力三维度评分</p>
    </div>

    <!-- 匹配配置 -->
    <div class="card">
        <div class="card-title">⚙️ 匹配配置</div>
        <div id="matchAlert" class="hidden"></div>
        <div class="alert alert-info" id="statusInfo">正在加载配置...</div>
        <div style="display:flex;gap:12px;align-items:center;margin-top:16px;">
            <button class="btn btn-primary" onclick="startMatch()" id="matchBtn">
                <span id="matchBtnContent">🚀 开始 AI 匹配</span>
            </button>
            <a href="resume_manage.html" class="btn btn-secondary">管理简历</a>
            <a href="job_scraper.html" class="btn btn-secondary">采集岗位</a>
        </div>
    </div>

    <!-- 匹配结果 -->
    <div class="card" id="resultsCard" style="display:none;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <div class="card-title" style="margin:0;">📊 匹配结果（<span id="resultCount">0</span> 条）</div>
            <div style="font-size:13px;color:var(--text-muted);">按匹配分数降序排列</div>
        </div>
        <div id="matchResults" class="match-grid"></div>
    </div>
</div>

<script>
async function checkStatus() {
    try {
        const [resumeRes, jobRes] = await Promise.all([
            fetch('/api/resume/get'), fetch('/api/jobs/list?retained_only=true')
        ]);
        const [resumeData, jobData] = await Promise.all([resumeRes.json(), jobRes.json()]);
        const resume = resumeData.success ? resumeData.resume : null;
        const jobs = jobData.success ? jobData.jobs : [];

        let msgs = [];
        if (!resume) msgs.push('❌ 未上传简历，请先<a href="resume_manage.html">上传并解析简历</a>');
        else if (!resume.parsed_data) msgs.push('❌ 简历未解析，请在<a href="resume_manage.html">简历管理</a>中重新上传');
        else msgs.push(`✅ 主简历：<b>${resume.parsed_data?.name || resume.file_name}</b>`);

        if (!jobs.length) msgs.push('❌ 没有已留存岗位，请先在<a href="job_scraper.html">岗位采集</a>中留存感兴趣的岗位');
        else msgs.push(`✅ 已留存岗位：<b>${jobs.length}</b> 条（AI 将依次匹配）`);

        const ok = resume && resume.parsed_data && jobs.length > 0;
        document.getElementById('statusInfo').className = `alert alert-${ok ? 'success' : 'warning'}`;
        document.getElementById('statusInfo').innerHTML = msgs.join('<br>');
        document.getElementById('matchBtn').disabled = !ok;
    } catch (e) {
        document.getElementById('statusInfo').className = 'alert alert-error';
        document.getElementById('statusInfo').textContent = '无法连接到服务器';
    }
}

async function startMatch() {
    const btn = document.getElementById('matchBtn');
    btn.disabled = true;
    document.getElementById('matchBtnContent').innerHTML = '<span class="spinner"></span> AI 分析中...';
    document.getElementById('matchAlert').classList.add('hidden');

    try {
        const res = await fetch('/api/match/start', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({})
        });
        const data = await res.json();
        if (data.success) {
            renderResults(data.results);
        } else {
            const el = document.getElementById('matchAlert');
            el.className = 'alert alert-error';
            el.textContent = `❌ ${data.error}`;
            el.classList.remove('hidden');
        }
    } catch (e) {
        const el = document.getElementById('matchAlert');
        el.className = 'alert alert-error';
        el.textContent = `❌ 请求失败：${e.message}`;
        el.classList.remove('hidden');
    } finally {
        btn.disabled = false;
        document.getElementById('matchBtnContent').textContent = '🚀 重新匹配';
        checkStatus();
    }
}

function getScoreClass(score) {
    if (score >= 70) return 'score-high';
    if (score >= 50) return 'score-mid';
    return 'score-low';
}

function renderResults(results) {
    document.getElementById('resultsCard').style.display = 'block';
    document.getElementById('resultCount').textContent = results.length;
    const container = document.getElementById('matchResults');
    if (!results.length) {
        container.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>暂无匹配结果</p></div>';
        return;
    }
    container.innerHTML = results.map(r => {
        const score = Math.round(r.match_score || 0);
        const matched = (r.matched_skills || '').split('、').filter(Boolean);
        const missing = (r.missing_skills || '').split('、').filter(Boolean);
        let strengths = [], suggestions = [];
        try { strengths = JSON.parse(r.ai_strengths || '[]'); } catch(e) {}
        try { suggestions = JSON.parse(r.ai_suggestions || '[]'); } catch(e) {}
        return `<div class="match-card">
            <div class="score-ring ${getScoreClass(score)}">${score}</div>
            <div class="match-info">
                <div class="match-title">
                    ${r.url ? `<a href="${r.url}" target="_blank" style="color:inherit;text-decoration:none;">${r.title}</a>` : r.title}
                    ${r.jd_missing ? '<span class="badge badge-warning" style="margin-left:8px;font-size:11px;">JD不完整</span>' : ''}
                </div>
                <div class="match-company">${r.company} · ${r.city || '不限'}</div>
                ${r.ai_analysis ? `<div class="match-analysis">${r.ai_analysis}</div>` : ''}
                <div class="score-bars">
                    <div class="score-bar-item">
                        <div class="score-bar-label">技能匹配</div>
                        <div class="score-bar-track"><div class="score-bar-fill" style="width:${r.skill_score||0}%"></div></div>
                        <div class="score-bar-val">${Math.round(r.skill_score||0)}</div>
                    </div>
                    <div class="score-bar-item">
                        <div class="score-bar-label">岗位契合</div>
                        <div class="score-bar-track"><div class="score-bar-fill" style="width:${r.fit_score||0}%"></div></div>
                        <div class="score-bar-val">${Math.round(r.fit_score||0)}</div>
                    </div>
                    <div class="score-bar-item">
                        <div class="score-bar-label">薪资吸引</div>
                        <div class="score-bar-track"><div class="score-bar-fill" style="width:${r.salary_score||0}%"></div></div>
                        <div class="score-bar-val">${Math.round(r.salary_score||0)}</div>
                    </div>
                </div>
                ${matched.filter(s=>s!=='—').length ? `<div class="skills-row">${matched.slice(0,5).map(s=>`<span class="skill-match">✓ ${s}</span>`).join('')}</div>` : ''}
                ${missing.filter(s=>s!=='—').length ? `<div class="skills-row">${missing.slice(0,5).map(s=>`<span class="skill-miss">✗ ${s}</span>`).join('')}</div>` : ''}
                <div class="match-actions">
                    ${r.url ? `<a href="${r.url}" target="_blank" class="btn btn-primary btn-sm">查看岗位</a>` : ''}
                    <a href="resume_optimize.html?job_id=${r.id}" class="btn btn-secondary btn-sm">优化简历</a>
                    <a href="auto_apply.html?job_id=${r.id}" class="btn btn-secondary btn-sm">投递</a>
                </div>
            </div>
        </div>`;
    }).join('');
}

checkStatus();
</script>
</body>
</html>
