<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>岗位采集 - 智能职业发展助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', 'Segoe UI', 'Microsoft YaHei', sans-serif; }
        :root {
            --primary: #2C7BE5; --primary-dark: #1E40AF; --primary-light: #3B82F6;
            --bg-primary: #F5F9FC; --bg-secondary: #FFFFFF;
            --text-primary: #1A365D; --text-secondary: #6B7280; --text-muted: #9CA3AF;
            --border: #E5E7EB; --success-bg: #E6F7E6; --success-text: #166534;
            --danger-bg: #FCE8E6; --danger-text: #991B1B;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05); --shadow: 0 2px 8px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.08); --radius: 8px;
        }
        body { background: var(--bg-primary); color: var(--text-primary); line-height: 1.6; }
        .navbar { background: var(--bg-secondary); box-shadow: var(--shadow-sm); position: sticky; top: 0; z-index: 100; }
        .navbar-content { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; max-width: 1200px; margin: 0 auto; }
        .navbar-brand { display: flex; align-items: center; gap: 12px; font-size: 18px; font-weight: 600; color: var(--text-primary); text-decoration: none; }
        .brand-icon { width: 32px; height: 32px; background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%); border-radius: var(--radius); display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 14px; }
        .navbar-back { color: var(--primary); text-decoration: none; font-size: 14px; display: flex; align-items: center; gap: 6px; }
        .container { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }
        .page-header { margin-bottom: 32px; }
        .page-title { font-size: 28px; font-weight: 700; color: var(--text-primary); margin-bottom: 8px; }
        .page-subtitle { font-size: 15px; color: var(--text-secondary); }
        .card { background: white; border-radius: var(--radius); border: 1px solid var(--border); box-shadow: var(--shadow); padding: 24px; margin-bottom: 24px; }
        .card-title { font-size: 16px; font-weight: 600; color: var(--text-primary); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-label { font-size: 13px; font-weight: 500; color: var(--text-secondary); }
        .form-input { padding: 10px 14px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 14px; color: var(--text-primary); background: white; outline: none; transition: border-color 0.2s; }
        .form-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(44,123,229,0.1); }
        .form-select { padding: 10px 14px; border: 1px solid var(--border); border-radius: var(--radius); font-size: 14px; color: var(--text-primary); background: white; outline: none; cursor: pointer; }
        .btn { padding: 10px 24px; border-radius: var(--radius); font-size: 14px; font-weight: 600; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 8px; transition: all 0.2s; text-decoration: none; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); }
        .btn-primary:disabled { background: #93c5fd; cursor: not-allowed; }
        .btn-secondary { background: white; color: var(--text-primary); border: 1px solid var(--border); }
        .btn-secondary:hover { border-color: var(--primary); color: var(--primary); }
        .btn-danger { background: #EF4444; color: white; }
        .btn-danger:hover { background: #DC2626; }
        .platform-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 16px; }
        .platform-item { border: 2px solid var(--border); border-radius: var(--radius); padding: 12px; text-align: center; cursor: pointer; transition: all 0.2s; user-select: none; }
        .platform-item.selected { border-color: var(--primary); background: #EFF6FF; }
        .platform-item .platform-icon { font-size: 24px; margin-bottom: 4px; }
        .platform-item .platform-name { font-size: 12px; color: var(--text-secondary); }
        .platform-item.selected .platform-name { color: var(--primary); font-weight: 600; }
        .alert { padding: 12px 16px; border-radius: var(--radius); font-size: 14px; margin-bottom: 16px; display: flex; align-items: flex-start; gap: 10px; }
        .alert-info { background: #EFF6FF; color: #1d4ed8; border: 1px solid #bfdbfe; }
        .alert-success { background: var(--success-bg); color: var(--success-text); border: 1px solid #86efac; }
        .alert-error { background: var(--danger-bg); color: var(--danger-text); border: 1px solid #fca5a5; }
        .alert-warning { background: #FFF7ED; color: #9a3412; border: 1px solid #fdba74; }
        .progress-bar { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; margin-bottom: 8px; }
        .progress-fill { height: 100%; background: var(--primary); border-radius: 3px; transition: width 0.3s; }
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { background: var(--bg-primary); padding: 12px 16px; text-align: left; font-weight: 600; color: var(--text-secondary); font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid var(--border); }
        td { padding: 12px 16px; border-bottom: 1px solid var(--border); color: var(--text-primary); vertical-align: middle; }
        tr:hover td { background: var(--bg-primary); }
        .badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
        .badge-blue { background: #EFF6FF; color: var(--primary); }
        .badge-green { background: var(--success-bg); color: var(--success-text); }
        .badge-gray { background: #F3F4F6; color: var(--text-secondary); }
        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
        .stat-card { background: white; border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; text-align: center; }
        .stat-number { font-size: 28px; font-weight: 700; color: var(--primary); }
        .stat-label { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }
        .empty-state { text-align: center; padding: 48px 24px; color: var(--text-muted); }
        .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
        .empty-state p { font-size: 15px; margin-bottom: 8px; }
        .filter-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
        .filter-row .form-input { flex: 1; min-width: 160px; }
        .action-btns { display: flex; gap: 8px; }
        .btn-sm { padding: 6px 14px; font-size: 13px; }
        .install-hint { background: #FFF7ED; border: 1px solid #fdba74; border-radius: var(--radius); padding: 16px; }
        .install-hint pre { background: #1E293B; color: #E2E8F0; padding: 12px; border-radius: 6px; font-size: 13px; margin-top: 8px; overflow-x: auto; white-space: pre-wrap; }
        .hidden { display: none !important; }
        .step-nav { background: white; border-bottom: 1px solid var(--border); padding: 8px 24px; }
        .step-nav-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; gap: 0; flex-wrap: wrap; width: 100%; box-sizing: border-box; }
        .step-link { font-size: 12px; padding: 4px 10px; border-radius: 20px; color: var(--text-secondary); text-decoration: none; white-space: nowrap; transition: all 0.2s; }
        .step-link:hover { color: var(--primary); background: #EFF6FF; }
        .step-link.active { background: var(--primary); color: white; font-weight: 600; }
        .step-arrow { color: var(--text-muted); font-size: 11px; margin: 0 1px; }
        .step-nav-btns { margin-left: auto; display: flex; gap: 8px; }
        .btn-step { font-size: 12px; padding: 4px 12px; border-radius: var(--radius); border: 1px solid var(--border); background: white; color: var(--text-secondary); cursor: pointer; text-decoration: none; transition: all 0.2s; }
        .btn-step:hover { border-color: var(--primary); color: var(--primary); }

        /* 响应式设计 */
        @media (max-width: 1280px) {
            .container,
            .navbar-content,
            .step-nav-inner {
                max-width: 1100px;
            }
        }

        @media (max-width: 1024px) {
            .container,
            .navbar-content,
            .step-nav-inner {
                max-width: 960px;
                padding: 0 20px;
            }
            .container {
                padding: 28px 20px;
            }
            .platform-grid {
                grid-template-columns: repeat(3, 1fr);
            }
            .stats-row {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .container,
            .navbar-content,
            .step-nav-inner {
                max-width: 100%;
                padding: 0 16px;
            }
            .container {
                padding: 24px 16px;
            }
            .page-title {
                font-size: 24px;
            }
            .form-row {
                grid-template-columns: 1fr;
            }
            .platform-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .stats-row {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }
            .stat-card {
                padding: 16px;
            }
            .stat-number {
                font-size: 24px;
            }
            .step-arrow {
                display: none;
            }
            .step-nav-btns {
                margin-left: 0;
                margin-top: 8px;
                width: 100%;
            }
            .btn-step {
                width: 100%;
                text-align: center;
            }
        }

        @media (max-width: 480px) {
            .container,
            .navbar-content,
            .step-nav-inner {
                padding: 0 12px;
            }
            .container {
                padding: 20px 12px;
            }
            .page-title {
                font-size: 20px;
            }
            .card {
                padding: 20px 16px;
            }
            .platform-grid {
                grid-template-columns: 1fr;
            }
            .stats-row {
                grid-template-columns: 1fr;
            }
            .step-link {
                font-size: 11px;
                padding: 3px 8px;
            }
        }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="navbar-content">
        <a href="/" class="navbar-brand"><div class="brand-icon">智</div>智能职业发展助手</a>
        <a href="/" class="navbar-back">← 返回首页</a>
    </div>
</nav>
<div class="step-nav"><div class="step-nav-inner">
  <a href="job_scraper.html" class="step-link active">1 岗位采集</a><span class="step-arrow">›</span>
  <a href="resume_manage.html" class="step-link">2 简历管理</a><span class="step-arrow">›</span>
  <a href="job_match.html" class="step-link">3 岗位匹配</a><span class="step-arrow">›</span>
  <a href="resume_optimize.html" class="step-link">4 简历优化</a><span class="step-arrow">›</span>
  <a href="auto_apply.html" class="step-link">5 自动投递</a><span class="step-arrow">›</span>
  <a href="interview_coach.html" class="step-link">6 模拟面试</a>
  <div class="step-nav-btns"><a href="resume_manage.html" class="btn-step">下一步 ›</a></div>
</div></div>
<div class="container">
    <div class="page-header">
        <h1 class="page-title">🔍 岗位采集</h1>
        <p class="page-subtitle">一键采集实习僧、BOSS直聘、智联招聘、前程无忧、大厂官网的实习岗位</p>
    </div>

    <!-- 采集配置 -->
    <div class="card">
        <div class="card-title">⚙️ 采集配置</div>
        <div class="form-row">
            <div class="form-group">
                <label class="form-label">搜索关键词 *</label>
                <input type="text" id="keyword" class="form-input" placeholder="例如：产品经理、数据分析、Java 开发" value="">
            </div>
            <div class="form-group">
                <label class="form-label">目标城市</label>
                <select id="city" class="form-select">
                    <option value="全国">全国</option>
                    <option value="北京">北京</option>
                    <option value="上海">上海</option>
                    <option value="广州">广州</option>
                    <option value="深圳">深圳</option>
                    <option value="杭州">杭州</option>
                    <option value="成都">成都</option>
                    <option value="南京">南京</option>
                    <option value="武汉">武汉</option>
                    <option value="西安">西安</option>
                    <option value="重庆">重庆</option>
                    <option value="苏州">苏州</option>
                </select>
            </div>
        </div>

        <div class="form-group" style="margin-bottom:16px;">
            <label class="form-label">采集平台（可多选）</label>
            <div class="platform-grid">
                <div class="platform-item selected" data-platform="shixiseng" onclick="togglePlatform(this)">
                    <div class="platform-icon">🎓</div>
                    <div class="platform-name">实习僧</div>
                </div>
                <div class="platform-item" data-platform="boss" onclick="togglePlatform(this)">
                    <div class="platform-icon">💼</div>
                    <div class="platform-name">BOSS直聘</div>
                </div>
                <div class="platform-item" data-platform="zhilian" onclick="togglePlatform(this)">
                    <div class="platform-icon">🔗</div>
                    <div class="platform-name">智联招聘</div>
                </div>
                <div class="platform-item" data-platform="wuyou" onclick="togglePlatform(this)">
                    <div class="platform-icon">⭐</div>
                    <div class="platform-name">前程无忧</div>
                </div>
                <div class="platform-item" data-platform="enterprise" onclick="togglePlatform(this)">
                    <div class="platform-icon">🏢</div>
                    <div class="platform-name">大厂官网</div>
                </div>
                <div class="platform-item" data-platform="wyujob" onclick="togglePlatform(this)">
                    <div class="platform-icon">🏛️</div>
                    <div class="platform-name">五邑大学就业</div>
                </div>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label">最大采集页数</label>
                <select id="maxPages" class="form-select">
                    <option value="1">1 页（约20条）</option>
                    <option value="3" selected>3 页（约60条）</option>
                    <option value="5">5 页（约100条）</option>
                    <option value="10">10 页（约200条）</option>
                </select>
            </div>
        </div>

        <div id="scrapeAlert" class="hidden"></div>

        <div style="display:flex;gap:12px;align-items:center;">
            <button class="btn btn-primary" onclick="startScrape()" id="scrapeBtn">
                <span id="scrapeBtnText">🚀 开始采集</span>
            </button>
            <button class="btn btn-secondary" onclick="clearJobs()">🗑️ 清空所有岗位</button>
        </div>

        <div id="progressSection" class="hidden" style="margin-top:16px;">
            <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
            <div style="font-size:13px;color:var(--text-secondary);" id="progressText">准备中...</div>
        </div>
    </div>

    <!-- 统计 -->
    <div class="stats-row" id="statsRow">
        <div class="stat-card"><div class="stat-number" id="statTotal">0</div><div class="stat-label">总岗位数</div></div>
        <div class="stat-card"><div class="stat-number" id="statRetained">0</div><div class="stat-label">已留存</div></div>
        <div class="stat-card"><div class="stat-number" id="statPlatforms">0</div><div class="stat-label">覆盖平台</div></div>
        <div class="stat-card"><div class="stat-number" id="statToday">0</div><div class="stat-label">今日新增</div></div>
    </div>

    <!-- 岗位列表 -->
    <div class="card">
        <div class="card-title">📋 岗位列表</div>
        <div class="filter-row">
            <input type="text" id="filterKeyword" class="form-input" placeholder="筛选关键词..." oninput="filterJobs()">
            <select id="filterPlatform" class="form-select" onchange="filterJobs()" style="min-width:120px;">
                <option value="">全部平台</option>
                <option value="shixiseng">实习僧</option>
                <option value="boss">BOSS直聘</option>
                <option value="zhilian">智联招聘</option>
                <option value="wuyou">前程无忧</option>
                <option value="enterprise">大厂官网</option>
            </select>
            <label style="font-size:13px;display:flex;align-items:center;gap:6px;cursor:pointer;">
                <input type="checkbox" id="filterRetained" onchange="filterJobs()"> 只看已留存
            </label>
            <button class="btn btn-secondary btn-sm" onclick="loadJobs()">🔄 刷新</button>
        </div>
        <div id="jobsContainer">
            <div class="empty-state"><div class="icon">🔍</div><p>暂无岗位数据</p><p style="font-size:13px;">点击「开始采集」获取岗位信息</p></div>
        </div>
    </div>
</div>

<script>
let allJobs = [];

function togglePlatform(el) {
    el.classList.toggle('selected');
}

function getSelectedPlatforms() {
    return Array.from(document.querySelectorAll('.platform-item.selected')).map(el => el.dataset.platform);
}

function showAlert(id, type, msg) {
    const el = document.getElementById(id);
    el.className = `alert alert-${type}`;
    el.innerHTML = msg;
    el.classList.remove('hidden');
}

async function startScrape() {
    const keyword = document.getElementById('keyword').value.trim();
    if (!keyword) { showAlert('scrapeAlert', 'error', '⚠️ 请输入搜索关键词'); return; }
    const platforms = getSelectedPlatforms();
    if (!platforms.length) { showAlert('scrapeAlert', 'error', '⚠️ 请至少选择一个采集平台'); return; }

    const btn = document.getElementById('scrapeBtn');
    btn.disabled = true;
    document.getElementById('scrapeBtnText').textContent = '⏳ 采集中...';
    document.getElementById('progressSection').classList.remove('hidden');
    document.getElementById('progressFill').style.width = '30%';
    document.getElementById('progressText').textContent = '正在采集中，请耐心等待（可能需要 2-5 分钟）...';
    document.getElementById('scrapeAlert').classList.add('hidden');

    try {
        const res = await fetch('/api/jobs/scrape', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                keyword,
                city: document.getElementById('city').value,
                platforms,
                maxPages: parseInt(document.getElementById('maxPages').value),
            })
        });
        const data = await res.json();
        document.getElementById('progressFill').style.width = '100%';

        if (data.success) {
            let msg = `✅ 采集完成，新增 <b>${data.total_inserted}</b> 条岗位。`;
            const details = Object.entries(data.results || {}).map(([p, r]) =>
                r.error ? `${p}: 失败(${r.error})` : `${p}: 采集${r.found}条/新增${r.inserted}条`
            ).join('；');
            if (details) msg += `<br><small style="opacity:.8">${details}</small>`;
            showAlert('scrapeAlert', 'success', msg);
            loadJobs();
        } else if (data.install_hint) {
            document.getElementById('scrapeAlert').className = '';
            document.getElementById('scrapeAlert').innerHTML = `
                <div class="install-hint">
                    <b>⚠️ ${data.error}</b>
                    <p style="margin-top:8px;font-size:13px;">请在命令行运行以下命令安装依赖：</p>
                    <pre>${data.install_hint}</pre>
                </div>`;
            document.getElementById('scrapeAlert').classList.remove('hidden');
        } else {
            showAlert('scrapeAlert', 'error', `❌ ${data.error}`);
        }
    } catch (e) {
        showAlert('scrapeAlert', 'error', `❌ 请求失败：${e.message}`);
    } finally {
        btn.disabled = false;
        document.getElementById('scrapeBtnText').textContent = '🚀 开始采集';
        document.getElementById('progressSection').classList.add('hidden');
    }
}

async function clearJobs() {
    if (!confirm('确定要清空所有岗位数据吗？此操作不可恢复。')) return;
    await fetch('/api/jobs/clear', {method: 'POST'});
    loadJobs();
}

async function retainJob(id, retain) {
    await fetch(`/api/jobs/${retain ? 'retain' : 'unretain'}`, {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({job_id: id})
    });
    const job = allJobs.find(j => j.id === id);
    if (job) job.is_retained = retain ? 1 : 0;
    renderJobs(getFilteredJobs());
    updateStats();
}

function filterJobs() {
    renderJobs(getFilteredJobs());
}

function getFilteredJobs() {
    const kw = document.getElementById('filterKeyword').value.toLowerCase();
    const platform = document.getElementById('filterPlatform').value;
    const retainedOnly = document.getElementById('filterRetained').checked;
    return allJobs.filter(j => {
        if (kw && !j.title.toLowerCase().includes(kw) && !j.company.toLowerCase().includes(kw)) return false;
        if (platform && j.platform !== platform) return false;
        if (retainedOnly && !j.is_retained) return false;
        return true;
    });
}

async function loadJobs() {
    try {
        const res = await fetch('/api/jobs/list');
        const data = await res.json();
        if (data.success) {
            allJobs = data.jobs || [];
            renderJobs(getFilteredJobs());
            updateStats();
        }
    } catch (e) {
        console.error('加载岗位失败', e);
    }
}

function updateStats() {
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('statTotal').textContent = allJobs.length;
    document.getElementById('statRetained').textContent = allJobs.filter(j => j.is_retained).length;
    document.getElementById('statPlatforms').textContent = new Set(allJobs.map(j => j.platform)).size;
    document.getElementById('statToday').textContent = allJobs.filter(j => j.scraped_at && j.scraped_at.startsWith(today)).length;
}

function renderJobs(jobs) {
    const container = document.getElementById('jobsContainer');
    if (!jobs.length) {
        container.innerHTML = '<div class="empty-state"><div class="icon">🔍</div><p>暂无岗位数据</p><p style="font-size:13px;">点击「开始采集」获取岗位信息</p></div>';
        return;
    }
    const platformNames = {shixiseng:'实习僧',boss:'BOSS直聘',zhilian:'智联招聘',wuyou:'前程无忧',enterprise:'大厂官网'};
    container.innerHTML = `<div class="table-wrap"><table>
        <thead><tr>
            <th>职位名称</th><th>公司</th><th>城市</th><th>薪资</th><th>平台</th><th>操作</th>
        </tr></thead>
        <tbody>${jobs.map(j => {
            const sal = j.salary_min && j.salary_max
                ? `${Math.round(j.salary_min/1000)}k-${Math.round(j.salary_max/1000)}k`
                : (j.salary_min ? `${Math.round(j.salary_min/1000)}k+` : '面议');
            const isRetained = j.is_retained;
            return `<tr>
                <td><a href="${j.url||'#'}" target="_blank" style="color:var(--primary);text-decoration:none;">${j.title}</a></td>
                <td>${j.company}</td>
                <td>${j.city||'-'}</td>
                <td>${sal}</td>
                <td><span class="badge badge-blue">${platformNames[j.platform]||j.platform}</span></td>
                <td><div class="action-btns">
                    <button class="btn btn-sm ${isRetained?'btn-secondary':'btn-primary'}"
                        onclick="retainJob(${j.id},${isRetained?'false':'true'})">
                        ${isRetained?'✓ 已留存':'+ 留存'}
                    </button>
                    ${j.url ? `<a href="${j.url}" target="_blank" class="btn btn-secondary btn-sm">查看</a>` : ''}
                </div></td>
            </tr>`;
        }).join('')}</tbody>
    </table></div>`;
}

loadJobs();
</script>
</body>
</html>
